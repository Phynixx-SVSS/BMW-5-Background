<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW M4 GT4 - Animated Wallpaper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background car image -->
    <div id="car-scene">
        <img id="car-image" src="bmw_m4_gt4_background.png" alt="BMW M4 GT4">
    </div>

    <!-- Canvas layers for effects -->
    <canvas id="smog-canvas"></canvas>
    <canvas id="light-canvas"></canvas>

    <!-- Particle overlay -->
    <canvas id="particle-canvas"></canvas>

    <!-- Vignette overlay -->
    <div id="vignette"></div>

    <!-- Light flare elements -->
    <div id="taillight-glow"></div>
    <div id="ambient-glow-left"></div>
    <div id="ambient-glow-right"></div>

    <script src="script.js"></script>
</body>
</html>
